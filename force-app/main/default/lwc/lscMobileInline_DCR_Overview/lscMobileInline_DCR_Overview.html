<template>
    <template lwc:if={hasPending}>
        <div class="container">
            <div class="banner" onclick={handleToggleAll}>
                <lightning-icon icon-name="utility:warning" size="xx-small" variant="warning" class="slds-m-right_xx-small"></lightning-icon>
                <span class="banner-text">
                    {pendingCount} pending Data Change Request{pluralS}
                </span>
                <lightning-icon icon-name={toggleIcon} size="xx-small" class="slds-m-left_xx-small toggle-icon"></lightning-icon>
            </div>

            <template lwc:if={isExpanded}>
                <div class="detail-panel">
                    <template for:each={pendingDcrs} for:item="dcr">
                        <div key={dcr.id} class="dcr-section">
                            <div class="dcr-section-header">
                                <span class="object-label">{dcr.objectLabel}</span>
                                <span class="meta">{dcr.name} &middot; {dcr.createdByName}</span>
                            </div>
                            <template lwc:if={dcr.hasChanges}>
                                <div class="table-wrapper">
                                    <table class="change-table">
                                        <thead>
                                            <tr>
                                                <th>Field</th>
                                                <th>Current</th>
                                                <th>Requested</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={dcr.changes} for:item="change">
                                                <tr key={change.key}>
                                                    <td>{change.label}</td>
                                                    <td class="old-value">{change.oldValue}</td>
                                                    <td class="new-value">{change.newValue}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>
</template>
