<template>
    <template lwc:if={isLoading}>
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </template>

    <template lwc:if={error}>
        <div class="slds-p-around_small slds-text-color_error slds-text-body_small">
            {error}
        </div>
    </template>

    <template lwc:if={hasDCRs}>
        <div class="slds-p-horizontal_small slds-p-vertical_xx-small">
            <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_xx-small">
                <lightning-icon icon-name="standard:record_update" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <span class="slds-text-title_caps slds-text-color_weak" style="font-size: 0.65rem;">DCR</span>
                <template lwc:if={hasPending}>
                    <lightning-badge label={pendingCount} class="slds-m-left_x-small slds-theme_warning" style="font-size: 0.65rem;"></lightning-badge>
                    <span class="slds-m-left_xx-small slds-text-body_small slds-text-color_weak">pending</span>
                </template>
                <template lwc:else>
                    <span class="slds-m-left_x-small slds-text-body_small slds-text-color_weak">{summaryText}</span>
                </template>
            </div>

            <template for:each={processedDcrs} for:item="dcr">
                <div key={dcr.id} class="dcr-row">
                    <div class="dcr-header slds-grid slds-grid_vertical-align-center" data-id={dcr.id} onclick={handleToggle}>
                        <lightning-icon
                            icon-name={dcr.chevronIcon}
                            size="xx-small"
                            class="slds-m-right_xx-small chevron"
                        ></lightning-icon>
                        <lightning-badge label={dcr.statusLabel} data-variant={dcr.statusVariant} class="status-badge slds-m-right_x-small"></lightning-badge>
                        <span class="slds-text-body_small slds-truncate">{dcr.objectLabel}</span>
                        <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">
                            &middot; {dcr.changeCount} field(s)
                        </span>
                    </div>

                    <template lwc:if={dcr.isExpanded}>
                        <div class="dcr-detail slds-p-left_medium slds-p-vertical_xx-small">
                            <template lwc:if={dcr.hasChanges}>
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-text-body_small">
                                    <thead>
                                        <tr>
                                            <th scope="col" class="slds-text-title_caps" style="width:30%">Field</th>
                                            <th scope="col" class="slds-text-title_caps" style="width:35%">Previous</th>
                                            <th scope="col" class="slds-text-title_caps" style="width:35%">New</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={dcr.changes} for:item="change">
                                            <tr key={change.key}>
                                                <td class="slds-text-color_weak">{change.label}</td>
                                                <td class="old-value">{change.oldValue}</td>
                                                <td class="new-value"><strong>{change.newValue}</strong></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>

                            <div class="slds-grid slds-grid_vertical-align-center slds-p-top_xx-small slds-text-body_small slds-text-color_weak">
                                <span>{dcr.name} &middot; {dcr.operationType} &middot; {dcr.validationType} &middot; {dcr.createdByName}</span>
                                <a href={dcr.recordUrl} class="slds-m-left_x-small">View Record</a>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>
</template>
