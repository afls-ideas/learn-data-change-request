<template>
    <lightning-card title="DCR Field Manager" icon-name="standard:settings">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <!-- Chevron Step Navigation -->
            <div class="step-nav slds-m-bottom_medium">
                <div class={stepCountriesClass} data-step="countries" onclick={handleStepClick}>
                    <span class="step-number">0</span>
                    <span class="step-label">Countries</span>
                </div>
                <lightning-button-icon
                    icon-name="utility:info"
                    variant="bare"
                    size="small"
                    alternative-text="Info"
                    data-step="countries"
                    onclick={handleStepInfo}
                    class="step-info-btn"
                ></lightning-button-icon>
                <div class="step-chevron">
                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                </div>
                <div class={stepObjectsClass} data-step="objectsAndRecTypes" onclick={handleStepClick}>
                    <span class="step-number">1</span>
                    <span class="step-label">DCR Objects &amp; Record Types</span>
                </div>
                <lightning-button-icon
                    icon-name="utility:info"
                    variant="bare"
                    size="small"
                    alternative-text="Info"
                    data-step="objectsAndRecTypes"
                    onclick={handleStepInfo}
                    class="step-info-btn"
                ></lightning-button-icon>
                <div class="step-chevron">
                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                </div>
                <div class={stepGridClass} data-step="countryGrid" onclick={handleStepClick}>
                    <span class="step-number">1A</span>
                    <span class="step-label">Country &times; Object Grid</span>
                </div>
                <lightning-button-icon
                    icon-name="utility:info"
                    variant="bare"
                    size="small"
                    alternative-text="Info"
                    data-step="countryGrid"
                    onclick={handleStepInfo}
                    class="step-info-btn"
                ></lightning-button-icon>
                <div class="step-chevron">
                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                </div>
                <div class={stepFieldsClass} data-step="managedFields" onclick={handleStepClick}>
                    <span class="step-number">2</span>
                    <span class="step-label">DCR Managed Fields</span>
                </div>
                <lightning-button-icon
                    icon-name="utility:info"
                    variant="bare"
                    size="small"
                    alternative-text="Info"
                    data-step="managedFields"
                    onclick={handleStepInfo}
                    class="step-info-btn"
                ></lightning-button-icon>
                <div class="step-chevron">
                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                </div>
                <div class={stepValidateClass} data-step="validateConfig" onclick={handleStepClick}>
                    <span class="step-number">3</span>
                    <span class="step-label">Validate Config</span>
                </div>
                <lightning-button-icon
                    icon-name="utility:info"
                    variant="bare"
                    size="small"
                    alternative-text="Info"
                    data-step="validateConfig"
                    onclick={handleStepInfo}
                    class="step-info-btn"
                ></lightning-button-icon>
            </div>

            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    label="Country"
                    value={selectedCountryId}
                    options={countries}
                    onchange={handleCountryChange}
                    class="country-picker"
                ></lightning-combobox>
            </div>

            <template lwc:if={isLoading}>
                <div class="slds-p-around_large slds-align_absolute-center">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={isSaving}>
                <div class="saving-overlay">
                    <lightning-spinner alternative-text="Saving" size="small"></lightning-spinner>
                </div>
            </template>

            <!-- STEP 0: Countries -->
            <template lwc:if={isCountriesStep}>
                <div class="countries-panel">
                    <div class="countries-header">
                        <h2>Manage Countries</h2>
                        <p class="countries-desc">Enable countries (LifeSciCountry records) that will be available for country-specific DCR configuration.</p>
                    </div>

                    <!-- Active Countries -->
                    <template lwc:if={hasActiveCountries}>
                        <div class="section-header section-configured slds-m-top_medium">
                            <lightning-icon icon-name="utility:success" size="x-small" class="section-icon-success"></lightning-icon>
                            <h2>Active Countries</h2>
                            <span class="section-count">{activeCountryCount}</span>
                        </div>
                        <div class="country-enable-grid">
                            <template for:each={activeCountries} for:item="country">
                                <div key={country.value} class="country-chip country-chip-active">
                                    <lightning-icon icon-name="standard:location" size="xx-small"></lightning-icon>
                                    <span class="country-chip-label">{country.label}</span>
                                    <lightning-button
                                        label="Remove"
                                        variant="destructive-text"
                                        size="small"
                                        data-id={country.value}
                                        data-label={country.label}
                                        onclick={handleRemoveCountry}
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="section-header section-unconfigured slds-m-top_medium">
                            <lightning-icon icon-name="utility:warning" size="x-small" class="section-icon-warning"></lightning-icon>
                            <h2>No Active Countries</h2>
                        </div>
                        <div class="empty-section">No LifeSciCountry records found. Add countries below to enable country-specific DCR configuration.</div>
                    </template>

                    <!-- Available Countries to Enable -->
                    <template lwc:if={hasAvailableCountries}>
                        <div class="section-header section-available slds-m-top_medium">
                            <lightning-icon icon-name="utility:add" size="x-small" class="section-icon-add"></lightning-icon>
                            <h2>Available Countries (click to enable)</h2>
                            <span class="section-count section-count-available">{availableCountryCount}</span>
                        </div>
                        <div class="country-enable-grid">
                            <template for:each={availableCountries} for:item="country">
                                <div key={country.isoCode} class="country-chip country-chip-available">
                                    <lightning-icon icon-name="standard:location" size="xx-small"></lightning-icon>
                                    <span class="country-chip-label">{country.label} ({country.isoCode})</span>
                                    <lightning-button
                                        label="Enable"
                                        variant="brand"
                                        size="small"
                                        data-iso={country.isoCode}
                                        data-label={country.label}
                                        onclick={handleAddCountry}
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- STEP 1: DCR Objects & Record Types -->
            <template lwc:if={isObjectsStep}>

                    <!-- Section: Enable/Disable Objects -->
                    <template lwc:if={hasDisabledObjects}>
                        <div class="section-header section-available">
                            <lightning-icon icon-name="utility:add" size="x-small" class="section-icon-add"></lightning-icon>
                            <h2>Available Objects (not yet enabled)</h2>
                            <span class="section-count section-count-available">{disabledCount}</span>
                        </div>
                        <div class="obj-enable-grid">
                            <template for:each={disabledObjects} for:item="obj">
                                <div key={obj.objectName} class="obj-enable-chip">
                                    <lightning-icon icon-name={obj.iconName} size="xx-small"></lightning-icon>
                                    <span class="obj-enable-name">{obj.objectName}</span>
                                    <lightning-button
                                        label="Enable"
                                        variant="brand"
                                        size="small"
                                        data-object={obj.objectName}
                                        onclick={handleEnableObject}
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                    </template>

                <template lwc:if={hasObjects}>

                    <!-- Section: Configured Objects (have RecType mappings) -->
                    <div class="section-header section-configured slds-m-top_medium">
                        <lightning-icon icon-name="utility:success" size="x-small" class="section-icon-success"></lightning-icon>
                        <h2>Objects with Record Type Mappings</h2>
                        <span class="section-count">{configuredCount}</span>
                    </div>
                    <template lwc:if={hasConfiguredObjects}>
                        <div class="obj-rt-grid">
                            <template for:each={configuredObjects} for:item="obj">
                                <div key={obj.defId} class="obj-rt-card obj-rt-card-configured">
                                    <div class="obj-rt-card-header">
                                        <lightning-icon icon-name={obj.iconName} size="small"></lightning-icon>
                                        <span class="obj-rt-name">{obj.objectName}</span>
                                        <lightning-badge label="Active" class="badge-active"></lightning-badge>
                                    </div>
                                    <div class="obj-rt-mappings">
                                        <template for:each={obj.recordTypeMappings} for:item="rtm">
                                            <div key={rtm.id} class="rt-mapping-row">
                                                <span class="rt-mapping-name">{rtm.recordTypeName}</span>
                                                <lightning-combobox
                                                    value={rtm.validationType}
                                                    options={rtm.validationOptions}
                                                    data-mappingid={rtm.id}
                                                    onchange={handleRecTypeMappingValidationChange}
                                                    variant="label-hidden"
                                                    label="Validation Type"
                                                    class="rt-mapping-combo"
                                                ></lightning-combobox>
                                                <span class="rt-mapping-scope">
                                                    <span class={rtm.scopeClass}>{rtm.scopeLabel}</span>
                                                </span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="obj-rt-card-footer">
                                        <div class="obj-rt-footer-info">
                                            <span class="obj-rt-field-count">{obj.managedCount} managed field{obj.managedPlural}</span>
                                            <template lwc:if={obj.hasPersonaDef}>
                                                <span class="obj-rt-persona-count">{obj.personaCount} persona{obj.personaPlural}</span>
                                            </template>
                                        </div>
                                        <lightning-button
                                            label="Add Record Type"
                                            variant="neutral"
                                            size="small"
                                            data-def={obj.defId}
                                            onclick={handleAddRecordType}
                                            icon-name="utility:add"
                                        ></lightning-button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="empty-section">No objects have record type mappings configured.</div>
                    </template>

                    <!-- Section: Unconfigured Objects (no RecType mappings) -->
                    <div class="section-header section-unconfigured slds-m-top_medium">
                        <lightning-icon icon-name="utility:warning" size="x-small" class="section-icon-warning"></lightning-icon>
                        <h2>Objects without Record Type Mappings</h2>
                        <span class="section-count">{unconfiguredCount}</span>
                    </div>
                    <template lwc:if={hasUnconfiguredObjects}>
                        <div class="obj-rt-grid">
                            <template for:each={unconfiguredObjects} for:item="obj">
                                <div key={obj.defId} class="obj-rt-card obj-rt-card-unconfigured">
                                    <div class="obj-rt-card-header">
                                        <lightning-icon icon-name={obj.iconName} size="small"></lightning-icon>
                                        <span class="obj-rt-name">{obj.objectName}</span>
                                        <lightning-badge label="No Mapping" class="badge-inactive"></lightning-badge>
                                        <lightning-button-icon
                                            icon-name="utility:ban"
                                            variant="bare"
                                            size="small"
                                            alternative-text="Disable DCR"
                                            title="Disable DCR for this object"
                                            data-def={obj.defId}
                                            data-object={obj.objectName}
                                            onclick={handleDisableObject}
                                            class="disable-btn"
                                        ></lightning-button-icon>
                                    </div>
                                    <div class="obj-rt-empty-msg">
                                        No LifeSciDataChgDefRecType records. DCR will not trigger for this object.
                                    </div>
                                    <div class="obj-rt-card-footer">
                                        <div class="obj-rt-footer-info"></div>
                                        <lightning-button
                                            label="Add Record Type"
                                            variant="neutral"
                                            size="small"
                                            data-def={obj.defId}
                                            onclick={handleAddRecordType}
                                            icon-name="utility:add"
                                        ></lightning-button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="empty-section">All objects have record type mappings configured.</div>
                    </template>

                </template>
            </template>

            <!-- STEP 1A: Country x Object Grid -->
            <template lwc:if={isCountryGridStep}>
                <template lwc:if={hasObjects}>
                    <div class="grid-filter-bar slds-m-bottom_small">
                        <lightning-combobox
                            label="Record Type"
                            value={gridRecordTypeFilter}
                            options={gridRecordTypeOptions}
                            onchange={handleGridRecordTypeChange}
                            class="grid-rt-filter"
                        ></lightning-combobox>
                    </div>
                    <div class="grid-view-wrapper">
                        <div class="grid-view-scroll">
                            <table class="country-grid">
                                <thead>
                                    <tr>
                                        <th class="grid-corner">Country</th>
                                        <template for:each={gridColumns} for:item="col">
                                            <th key={col.key} class="grid-obj-header">
                                                <lightning-icon icon-name={col.iconName} size="xx-small"></lightning-icon>
                                                <span>{col.objectName}</span>
                                            </th>
                                        </template>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Global row -->
                                    <tr class="grid-row-global">
                                        <td class="grid-country-cell">
                                            <strong>Global (All Countries)</strong>
                                        </td>
                                        <template for:each={gridGlobalRow} for:item="cell">
                                            <td key={cell.key} class={cell.cellClass}>
                                                <template lwc:if={cell.hasMappings}>
                                                    <template for:each={cell.mappings} for:item="m">
                                                        <div key={m.key} class="grid-mapping">
                                                            <span class="grid-rt-name">{m.recordTypeName}</span>
                                                            <span class={m.badgeClass}>{m.validationType}</span>
                                                            <template lwc:if={m.hasExternalSystem}>
                                                                <span class="grid-ext-system">{m.externalSystemName}</span>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template lwc:else>
                                                    <span class="grid-no-mapping">No mapping</span>
                                                </template>
                                            </td>
                                        </template>
                                    </tr>
                                    <!-- Country rows -->
                                    <template for:each={gridCountryRows} for:item="row">
                                        <tr key={row.key}>
                                            <td class="grid-country-cell">{row.countryLabel}</td>
                                            <template for:each={row.cells} for:item="cell">
                                                <td key={cell.key} class={cell.cellClass}>
                                                    <template lwc:if={cell.hasMappings}>
                                                        <template for:each={cell.mappings} for:item="m">
                                                            <div key={m.key} class="grid-mapping">
                                                                <span class="grid-rt-name">{m.recordTypeName}</span>
                                                                <span class={m.badgeClass}>{m.validationType}</span>
                                                                <template lwc:if={m.hasExternalSystem}>
                                                                    <span class="grid-ext-system">{m.externalSystemName}</span>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </template>
                                                    <template lwc:elseif={cell.canCreateOverride}>
                                                        <span
                                                            class="grid-inherited grid-inherited-clickable"
                                                            data-def={cell.defId}
                                                            data-country={cell.countryId}
                                                            onclick={handleGridCellCreateOverride}
                                                        >Inherits Global
                                                            <lightning-icon icon-name="utility:add" size="xx-small" class="grid-add-icon"></lightning-icon>
                                                        </span>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="grid-inherited">Inherits Global</span>
                                                    </template>
                                                </td>
                                            </template>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>
            </template>

            <!-- STEP 2: DCR Managed Fields (existing UI) -->
            <template lwc:if={isManagedFieldsStep}>
                <template lwc:if={hasObjects}>
                    <div class="tile-grid">
                        <template for:each={processedObjects} for:item="obj">
                            <div key={obj.defId} class={obj.tileClass} data-object={obj.objectName} onclick={handleSelectObject}>
                                <div class="tile-icon">
                                    <lightning-icon icon-name={obj.iconName} size="medium"></lightning-icon>
                                </div>
                                <div class="tile-body">
                                    <span class="tile-name">{obj.objectName}</span>
                                    <div class="tile-status-row">
                                        <template lwc:if={obj.isConfigured}>
                                            <lightning-icon icon-name="utility:lock" size="xx-small" class="lock-icon"></lightning-icon>
                                        </template>
                                        <span class={obj.statusClass}>{obj.summary}</span>
                                    </div>
                                    <div class="tile-config">
                                        <template for:each={obj.configItems} for:item="ci">
                                            <span key={ci.key} class={ci.chipClass}>{ci.label}</span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <template lwc:if={selectedObject}>
                        <div class="field-panel">
                            <div class="field-panel-header">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-button-icon
                                        icon-name="utility:back"
                                        variant="bare"
                                        alternative-text="Back"
                                        onclick={handleDeselectObject}
                                        class="slds-m-right_small"
                                    ></lightning-button-icon>
                                    <h2 class="panel-title">{selectedObject.objectName}</h2>
                                    <lightning-badge label={selectedObject.summary} class={selectedObject.badgeClass}></lightning-badge>
                                </div>

                                <!-- Config status bar -->
                                <div class="config-bar slds-m-top_small">
                                    <div class="config-item">
                                        <span class="config-label">Record Type:</span>
                                        <template lwc:if={selectedObject.hasRecordType}>
                                            <lightning-badge label={selectedObject.recTypeValidation} class="slds-m-left_x-small badge-active"></lightning-badge>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="bare"
                                                size="small"
                                                alternative-text="Remove Record Type"
                                                data-rectypeid={selectedObject.recTypeId}
                                                onclick={handleRemoveRecordType}
                                                class="slds-m-left_x-small"
                                            ></lightning-button-icon>
                                        </template>
                                        <template lwc:else>
                                            <lightning-button
                                                label="Add Record Type"
                                                variant="neutral"
                                                size="small"
                                                data-def={selectedObject.defId}
                                                onclick={handleAddRecordType}
                                                class="slds-m-left_x-small"
                                            ></lightning-button>
                                        </template>
                                    </div>
                                    <div class="config-item">
                                        <span class="config-label">Profiles:</span>
                                        <template lwc:if={selectedObject.hasPersonaDef}>
                                            <template for:each={selectedObject.personas} for:item="p">
                                                <span key={p.id} class="persona-chip">
                                                    {p.profileName}
                                                    <lightning-button-icon
                                                        icon-name="utility:close"
                                                        variant="bare"
                                                        size="x-small"
                                                        alternative-text="Remove"
                                                        data-personaid={p.id}
                                                        onclick={handleRemovePersona}
                                                    ></lightning-button-icon>
                                                </span>
                                            </template>
                                        </template>
                                        <lightning-button
                                            label="Add Profile"
                                            variant="neutral"
                                            size="small"
                                            data-def={selectedObject.defId}
                                            onclick={handleAddPersona}
                                            class="slds-m-left_x-small"
                                        ></lightning-button>
                                    </div>
                                </div>

                                <div class="slds-m-top_small">
                                    <lightning-input
                                        type="search"
                                        placeholder="Filter fields..."
                                        value={searchTerm}
                                        onchange={handleSearchChange}
                                        variant="label-hidden"
                                        label="Search"
                                    ></lightning-input>
                                </div>
                            </div>

                            <div class="field-table-wrapper">
                                <table class="field-table">
                                    <thead>
                                        <tr>
                                            <th style="width:50px">DCR</th>
                                            <th>Field Label</th>
                                            <th>API Name</th>
                                            <th>Type</th>
                                            <th style="width:80px">Scope</th>
                                            <th style="width:140px">Validation</th>
                                            <th style="width:80px">Apply Immediately</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={selectedObject.displayFields} for:item="field">
                                            <tr key={field.key} class={field.rowClass}>
                                                <td>
                                                    <lightning-input
                                                        type="checkbox"
                                                        checked={field.isManaged}
                                                        data-field={field.apiName}
                                                        data-def={field.defId}
                                                        data-label={field.label}
                                                        data-managed={field.managedFieldId}
                                                        onchange={handleFieldToggle}
                                                        variant="label-hidden"
                                                        label="Toggle DCR"
                                                    ></lightning-input>
                                                </td>
                                                <td class="field-label">
                                                    {field.label}
                                                    <template lwc:if={field.showCompoundHint}>
                                                        <span class="compound-hint">{field.compoundHint}</span>
                                                    </template>
                                                </td>
                                                <td class="field-api">{field.apiName}</td>
                                                <td class="field-type">{field.typeLabel}</td>
                                                <td>
                                                    <template lwc:if={field.canCreateOverride}>
                                                        <lightning-button
                                                            label="Override"
                                                            variant="brand-outline"
                                                            size="small"
                                                            icon-name="utility:add"
                                                            data-field={field.apiName}
                                                            data-def={field.defId}
                                                            data-label={field.label}
                                                            onclick={handleCreateOverride}
                                                        ></lightning-button>
                                                    </template>
                                                    <template lwc:elseif={field.showScope}>
                                                        <span class={field.scopeClass}>{field.scopeLabel}</span>
                                                    </template>
                                                </td>
                                                <td>
                                                    <template lwc:if={field.isManaged}>
                                                        <lightning-combobox
                                                            value={field.validationType}
                                                            options={field.validationOptions}
                                                            data-managed={field.managedFieldId}
                                                            onchange={handleValidationChange}
                                                            variant="label-hidden"
                                                            label="Validation Type"
                                                        ></lightning-combobox>
                                                    </template>
                                                </td>
                                                <td>
                                                    <template lwc:if={field.isManaged}>
                                                        <lightning-input
                                                            type="checkbox"
                                                            checked={field.applyImmediately}
                                                            data-managed={field.managedFieldId}
                                                            onchange={handleApplyImmediatelyChange}
                                                            variant="label-hidden"
                                                            label="Apply Immediately"
                                                        ></lightning-input>
                                                    </template>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </template>
            </template>

            <!-- STEP 3: Validate Config -->
            <template lwc:if={isValidateStep}>
                <div class="validate-panel">
                    <div class="validate-header">
                        <h2>Configuration Validation</h2>
                        <p class="validate-desc">Run checks to detect mismatches and missing configuration that would cause DCRs to silently fail.</p>
                        <lightning-button
                            label="Run Validation"
                            variant="brand"
                            icon-name="utility:check"
                            onclick={handleRunValidation}
                            class="slds-m-top_small"
                        ></lightning-button>
                    </div>

                    <template lwc:if={isValidating}>
                        <div class="slds-p-around_large slds-align_absolute-center">
                            <lightning-spinner alternative-text="Validating" size="medium"></lightning-spinner>
                        </div>
                    </template>

                    <template lwc:if={hasValidationResults}>
                        <div class="validate-results slds-m-top_medium">
                            <template for:each={validationResults} for:item="vr">
                                <div key={vr.key} class={vr.rowClass}>
                                    <div class="vr-icon">
                                        <lightning-icon icon-name={vr.iconName} size="x-small" class={vr.iconClass}></lightning-icon>
                                    </div>
                                    <div class="vr-body">
                                        <template lwc:if={vr.objectName}>
                                            <span class="vr-object">{vr.objectName}</span>
                                        </template>
                                        <span class="vr-message">{vr.message}</span>
                                        <template lwc:if={vr.detail}>
                                            <span class="vr-detail">{vr.detail}</span>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </lightning-card>

    <!-- Record Type Modal -->
    <template lwc:if={showRecordTypeModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        alternative-text="Close"
                        onclick={handleCloseRecordTypeModal}
                        class="slds-modal__close"
                    ></lightning-button-icon>
                    <h2 class="slds-modal__title">Add Record Type Mapping</h2>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox
                        label="DCR Record Type"
                        value={modalRecordTypeId}
                        options={recordTypeOptions}
                        onchange={handleModalRecordTypeChange}
                        class="slds-m-bottom_small"
                    ></lightning-combobox>
                    <lightning-combobox
                        label="Validation Type"
                        value={modalValidationType}
                        options={validationTypeOptions}
                        onchange={handleModalValidationChange}
                        class="slds-m-bottom_small"
                    ></lightning-combobox>
                    <template lwc:if={isModalExternal}>
                        <lightning-input
                            label="External Validation System Name"
                            value={modalExternalSystemName}
                            onchange={handleModalExternalSystemChange}
                            placeholder="e.g. OneKey, HSJ"
                            class="slds-m-bottom_small"
                        ></lightning-input>
                    </template>
                    <lightning-combobox
                        label="Country"
                        value={modalCountryId}
                        options={countries}
                        onchange={handleModalCountryChange}
                        field-level-help="Leave as 'All Countries' for a global mapping, or select a country to create a country-specific override."
                    ></lightning-combobox>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseRecordTypeModal}></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={handleSaveRecordType} class="slds-m-left_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Step Info Modal -->
    <template lwc:if={showStepInfoModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container slds-modal_small">
                <div class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        alternative-text="Close"
                        onclick={handleCloseStepInfo}
                        class="slds-modal__close"
                    ></lightning-button-icon>
                    <h2 class="slds-modal__title">{stepInfoTitle}</h2>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="step-info-desc">{stepInfoDescription}</p>
                    <div class="step-info-objects">
                        <span class="step-info-label">Objects modified:</span>
                        <template for:each={stepInfoObjects} for:item="obj">
                            <code key={obj} class="step-info-object">{obj}</code>
                        </template>
                    </div>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleCloseStepInfo}></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Persona Modal -->
    <template lwc:if={showPersonaModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        alternative-text="Close"
                        onclick={handleClosePersonaModal}
                        class="slds-modal__close"
                    ></lightning-button-icon>
                    <h2 class="slds-modal__title">Add Profile</h2>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox
                        label="Profile"
                        value={modalProfileId}
                        options={profileOptions}
                        onchange={handleModalProfileChange}
                        class="slds-m-bottom_small"
                    ></lightning-combobox>
                    <lightning-combobox
                        label="Change Update Type"
                        value={modalChangeUpdateType}
                        options={changeUpdateOptions}
                        onchange={handleModalChangeUpdateChange}
                    ></lightning-combobox>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleClosePersonaModal}></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={handleSavePersona} class="slds-m-left_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
